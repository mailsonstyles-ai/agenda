name: Supabase Keep Alive Cron

on:
  schedule:
    # Executa a cada 2 dias à meia-noite (00:00)
    - cron: '0 0 */2 * *'
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Realizar consulta autenticada na API do Supabase
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/keep_alive?select=*&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✅ Ping executado com sucesso! Status: $HTTP_STATUS"
          else
            echo "❌ Falha ao tentar pingar o Supabase. Status: $HTTP_STATUS"
            exit 1
          fi
